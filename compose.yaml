services:
  postgres:
    image: postgres:16
    container_name: minilab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/sample_sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minilab-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  mc:
    image: minio/mc:latest
    container_name: minilab-mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb -p local/${MINIO_BUCKET} || true;
      mc anonymous set none local/${MINIO_BUCKET} || true;
      tail -f /dev/null
      "

  # ----------------------------------------------------------------
  # Tahap 2 — Analisis (aktif hanya dengan: docker compose --profile analysis up -d)
  # ----------------------------------------------------------------
  jupyter:
    profiles: ["analysis"]
    image: jupyter/pyspark-notebook:latest
    container_name: minilab-jupyter
    restart: unless-stopped
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_ENDPOINT: "http://minio:9000"
    volumes:
      - .:/home/jovyan/work
    depends_on:
      minio:
        condition: service_healthy
    working_dir: /home/jovyan/work
    command: >
      bash -c "pip install -r /home/jovyan/work/analysis-requirements.txt -q
      && start-notebook.sh"

volumes:
  postgres_data:
  minio_data:
